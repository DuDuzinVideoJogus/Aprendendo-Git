<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmador de Aura</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .aura-message {
            position: fixed;
            font-size: 2.5rem;
            font-weight: bold;
            color: #a855f7;
            text-shadow: 0 0 10px #a855f7, 0 0 20px #a855f7, 0 0 30px #9333ea;
            animation: brilho 0.6s ease-out forwards;
            pointer-events: none;
            font-family: 'Arial', sans-serif;
        }

        @keyframes brilho {
            0% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
            100% {
                opacity: 0;
                transform: scale(1.2) translateY(-60px);
            }
        }

        .titulo {
            text-align: center;
            color: #a855f7;
            text-shadow: 0 0 20px #a855f7;
            font-size: 3rem;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="titulo">Clique em qualquer tecla para farmear aura!</div>

    <script>
        document.addEventListener('keydown', function(event) {
            criarMensagemAura();
        });

        document.addEventListener('click', function(event) {
            criarMensagemAura(event.clientX, event.clientY);
        });

        function criarMensagemAura(x, y) {
            const mensagem = document.createElement('div');
            mensagem.className = 'aura-message';
            mensagem.textContent = 'farmou +1 de aura';
            
            if (x !== undefined && y !== undefined) {
                mensagem.style.left = x + 'px';
                mensagem.style.top = y + 'px';
            } else {
                mensagem.style.left = (window.innerWidth / 2) + 'px';
                mensagem.style.top = (window.innerHeight / 2) + 'px';
                mensagem.style.transform = 'translateX(-50%) translateY(-50%)';
            }
            
            document.body.appendChild(mensagem);
            
            setTimeout(function() {
                mensagem.remove();
            }, 600);
        }
    </script>
</body>
</html>
