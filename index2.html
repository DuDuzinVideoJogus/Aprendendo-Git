<!doctype html>
<html lang="pt-BR">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Rede Social - Layout inspirado (2016)</title>
	<style>
		:root{--blue:#3b5998;--dark:#222;--muted:#777}
		body{font-family: Arial, Helvetica, sans-serif; margin:0; background:#f0f2f5;}
		header{background:var(--blue); color:#fff; padding:10px 16px; display:flex; align-items:center;}
		.brand{font-weight:700; margin-right:24px}
		.search{flex:1}
		.search input{width:100%; padding:8px 12px; border-radius:16px; border:0}
		.container{display:flex; max-width:1000px; margin:20px auto; gap:16px}
		.left, .right{width:250px}
		.main{flex:1}
		.card{background:#fff; border-radius:4px; padding:12px; box-shadow:0 1px 2px rgba(0,0,0,0.05); margin-bottom:12px}
		.profile{display:flex; align-items:center; gap:10px}
		.avatar{width:44px; height:44px; border-radius:50%; background:var(--muted)}
		.post-box{display:flex; gap:10px}
		textarea{width:100%; resize:none; border-radius:4px; border:1px solid #ddd; padding:8px}
		.actions{display:flex; gap:8px; margin-top:8px}
		.btn{background:var(--blue); color:#fff; padding:8px 12px; border-radius:4px; border:0; cursor:pointer}
		.feed .post{padding:12px 0; border-top:1px solid #eee}
		.post .meta{color:var(--muted); font-size:13px}
		.post img{max-width:100%; border-radius:4px; margin-top:8px}
		/* simple responsive */
		@media (max-width:800px){.container{flex-direction:column; padding:0 8px} .left,.right{width:auto}}
	</style>
</head>
<body>
	<header>
		<div class="brand">RedeSocial</div>
		<div class="search"><input placeholder="Pesquisar" aria-label="Pesquisar"></div>
		<div style="margin-left:12px">Usuário</div>
	</header>

	<div class="container">
		<aside class="left">
			<div class="card">
				<div style="font-weight:700">Atalhos</div>
				<ul style="padding-left:16px; color:var(--muted)">
					<li>Feed</li>
					<li>Mensagens</li>
					<li>Eventos</li>
				</ul>
			</div>
		</aside>

		<main class="main">
			<section class="card post-box" aria-label="Criar publicação">
				<div class="avatar" aria-hidden="true"></div>
				<div style="flex:1">
					<textarea id="composer" rows="3" placeholder="No que você está pensando?"></textarea>
					<div class="actions">
						<button id="postBtn" class="btn">Publicar</button>
						<div style="flex:1"></div>
						<div style="color:var(--muted); font-size:13px">Público</div>
					</div>
				</div>
			</section>

			<section class="feed card" id="feed">
				<div style="font-weight:700; margin-bottom:8px">Feed de Notícias</div>
				<!-- posts aparecerão aqui -->
			</section>
		</main>

		<aside class="right">
			<div class="card">
				<div style="font-weight:700">Contatos</div>
				<div style="color:var(--muted); margin-top:8px">Nenhuma atividade recente</div>
			</div>
		</aside>
	</div>

	<script>
		// Código simples para adicionar publicações ao feed
		const postBtn = document.getElementById('postBtn');
		const composer = document.getElementById('composer');
		const feed = document.getElementById('feed');

		function createPost(content){
			const div = document.createElement('div');
			div.className = 'post';
			div.innerHTML = `
				<div class="profile">
					<div class="avatar" aria-hidden="true"></div>
					<div>
						<div style="font-weight:600">Você</div>
						<div class="meta">Agora</div>
					</div>
				</div>
				<div style="margin-top:8px">${escapeHtml(content)}</div>
			`;
			feed.appendChild(div);
		}

		function escapeHtml(s){ return s.replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }

		postBtn.addEventListener('click', ()=>{
			const text = composer.value.trim();
			if(!text) return;
			createPost(text);
			composer.value='';
		});
	</script>
</body>
</html>
